<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Compute Weather</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brandline">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">AI Compute Weather</p>
            <h1 data-i18n="hero.title">Off-peak compute router</h1>
          </div>
        </div>
        <div class="actions">
          <label class="language-control" for="languageSelect">
            <span class="visually-hidden" data-i18n="language.label">Language</span>
            <select id="languageSelect" aria-label="Language" data-i18n-aria-label="language.label">
              <option value="ja">日本語</option>
              <option value="en">English</option>
              <option value="zh">中文</option>
              <option value="ko">한국어</option>
              <option value="es">Español</option>
              <option value="ceb">Bisaya</option>
              <option value="th">ไทย</option>
              <option value="vi">Tiếng Việt</option>
              <option value="pt">Português</option>
            </select>
          </label>
          <span class="sync-pill"><span class="live-dot live"></span><span id="updatedAt">--</span></span>
          <a class="button secondary" href="/api/export.csv" aria-label="Export CSV" data-i18n-aria-label="exportCsv">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>
            CSV
          </a>
          <button class="button" id="refreshButton" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M20 6v5h-5M4 18v-5h5m9.5-4A7 7 0 0 0 6 7.8M5.5 16A7 7 0 0 0 18 16.2"/></svg>
            <span data-i18n="refresh">Refresh</span>
          </button>
        </div>
      </header>

      <section class="metrics" aria-label="Market summary" data-i18n-aria-label="marketSummary">
        <article class="metric">
          <span class="metric-label" data-i18n="metric.cheapest">Cheapest</span>
          <strong id="cheapestMetric">$--</strong>
          <span id="cheapestSub">--</span>
        </article>
        <article class="metric">
          <span class="metric-label" data-i18n="metric.signal">Signal</span>
          <strong id="signalMetric">--</strong>
          <span id="signalSub">--</span>
        </article>
        <article class="metric">
          <span class="metric-label" data-i18n="metric.liveOffers">Live offers</span>
          <strong id="liveMetric">--</strong>
          <span id="sourceSub">--</span>
        </article>
        <article class="metric">
          <span class="metric-label" data-i18n="metric.queuedJobs">Queued jobs</span>
          <strong id="queueMetric">--</strong>
          <span id="queueSub">--</span>
        </article>
      </section>

      <section class="workspace">
        <div class="market-panel panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow" data-i18n="market.eyebrow">Market</p>
              <h2 data-i18n="market.title">GPU prices</h2>
            </div>
            <div class="filters">
              <select id="gpuFilter" aria-label="GPU filter" data-i18n-aria-label="filter.gpu"></select>
              <select id="providerFilter" aria-label="Provider filter" data-i18n-aria-label="filter.provider"></select>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th data-i18n="table.provider">Provider</th>
                  <th data-i18n="table.gpu">GPU</th>
                  <th data-i18n="table.region">Region</th>
                  <th data-i18n="table.instance">Instance</th>
                  <th data-i18n="table.price">$/GPU h</th>
                  <th data-i18n="table.source">Source</th>
                </tr>
              </thead>
              <tbody id="offerRows"></tbody>
            </table>
          </div>
        </div>

        <aside class="side-stack">
          <section class="decision panel">
            <div class="panel-block">
              <p class="eyebrow" data-i18n="dispatch.eyebrow">Dispatch</p>
              <h2 id="decisionTitle">--</h2>
              <p id="decisionDetail">--</p>
            </div>
          </section>

          <form class="job-form panel" id="jobForm">
            <p class="eyebrow" data-i18n="queue.eyebrow">Queue</p>
            <label class="wide">
              <span data-i18n="form.name">Name</span>
              <input name="name" value="embedding-backfill" maxlength="80">
            </label>
            <label>
              <span data-i18n="form.gpu">GPU</span>
              <select name="gpu" id="jobGpu"></select>
            </label>
            <label>
              <span data-i18n="form.executor">Executor</span>
              <select name="executor" id="jobExecutor">
                <option value="dry-run" data-i18n="executor.dry-run">Dry run</option>
                <option value="local" data-i18n="executor.local">Local command</option>
                <option value="vast" disabled data-i18n="executor.vastPlanned">Vast.ai connector (planned)</option>
                <option value="runpod" disabled data-i18n="executor.runpodPlanned">RunPod connector (planned)</option>
              </select>
            </label>
            <label class="wide">
              <span data-i18n="form.command">Command</span>
              <textarea name="command" rows="3">node -e "console.log('cheap compute window:', process.env.AI_COMPUTE_PROVIDER, process.env.AI_COMPUTE_GPU, process.env.AI_COMPUTE_PRICE_USD_GPU_HOUR)"</textarea>
            </label>
            <label>
              <span data-i18n="form.maxPrice">Max $/GPU h</span>
              <input name="maxPriceUsdGpuHour" type="number" min="0.01" step="0.01" value="1.75">
            </label>
            <label>
              <span data-i18n="form.retries">Retries</span>
              <input name="retryLimit" type="number" min="0" max="5" step="1" value="1">
            </label>
            <label>
              <span data-i18n="form.timeout">Timeout s</span>
              <input name="timeoutSeconds" type="number" min="1" max="3600" step="1" value="120">
            </label>
            <label>
              <span data-i18n="form.deadline">Deadline h</span>
              <input name="deadlineHours" type="number" min="1" max="168" step="1" value="6">
            </label>
            <button class="button full" type="submit">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m5 12 14-7-7 14-2-7-5 0Z"/></svg>
              <span data-i18n="form.queueJob">Queue job</span>
            </button>
          </form>
        </aside>
      </section>

      <section class="charts">
        <div class="chart-panel panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow" data-i18n="trend.eyebrow">Trend</p>
              <h2 data-i18n="trend.title">Cheapest price</h2>
            </div>
            <span class="timestamp" data-i18n="trend.samples">Last 96 samples</span>
          </div>
          <canvas id="priceChart" width="900" height="260" aria-label="Price trend"></canvas>
        </div>
        <div class="queue-panel panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow" data-i18n="jobs.eyebrow">Jobs</p>
              <h2 data-i18n="jobs.title">Batch queue</h2>
            </div>
          </div>
          <div id="jobList" class="job-list"></div>
        </div>
      </section>

      <section class="sources" id="sources"></section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
